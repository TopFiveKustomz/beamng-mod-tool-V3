<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>BeamNG Mod Health Tool V3</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script><style>
body { font-family: Arial; background:#111; color:#eee; padding:20px; }
button, input { width:100%; padding:10px; margin-top:10px; }
.card { background:#1c1c1c; padding:10px; margin-top:10px; border-radius:8px; }
.good { color:#4caf50; }
.warn { color:#ff9800; }
.bad { color:#f44336; }
</style></head><body><h2>BeamNG Mod Health Tool V3</h2><input type="file" id="zipFile" accept=".zip">
<input type="text" id="carNameOverride" placeholder="Override vehicle name (optional)">
<label>
  <input type="checkbox" id="strictMode"> Strict Mode (BeamNG standards)
</label><button onclick="analyzeMod()">Analyze</button>
<button onclick="fixAndExport()">Fix & Export Clean ZIP</button>

<div id="output" class="card"></div><script>
let loadedZip = null;
let report = [];
let detectedVehicles = [];

function addIssue(type, msg) {
  report.push(`[${type}] ${msg}`);
}

function detectVehicles(zip) {
  let vehicles = new Set();

  for (const filename in zip.files) {
    const match = filename.match(/vehicles\/([^\/]+)\//);
    if (match) vehicles.add(match[1]);
  }

  return [...vehicles];
}

function detectVehicleName(zip) {
  const list = detectVehicles(zip);
  return list.length ? list[0] : "custom_vehicle";
}

async function analyzeMod() {
  const fileInput = document.getElementById('zipFile');
  const output = document.getElementById('output');

  if (!fileInput.files.length) {
    alert("Select a ZIP file");
    return;
  }

  loadedZip = await JSZip.loadAsync(fileInput.files[0]);
  report = [];

  detectedVehicles = detectVehicles(loadedZip);

  const strict = document.getElementById("strictMode").checked;

  let score = 100;

  for (const filename in loadedZip.files) {
    const file = loadedZip.files[filename];

    if (!filename.endsWith(".jbeam") && !filename.endsWith(".json")) continue;

    const text = await file.async("string");

    // --- multi vehicle awareness ---
    if (detectedVehicles.length > 1) {
      addIssue("WARN", `Multiple vehicles detected: ${detectedVehicles.join(", ")}`);
      score -= 5;
      break;
    }

    // --- structure checks ---
    if (!text.includes('"nodes"')) {
      addIssue("BAD", `${filename} missing nodes`);
      score -= 10;
    }

    if (strict && !filename.includes("vehicles/")) {
      addIssue("BAD", `${filename} not in vehicles/ folder (strict mode)`);
      score -= 10;
    }

    if (/mohawk|bruckell/i.test(text)) {
      addIssue("BAD", `${filename} contains donor references`);
      score -= 5;
    }

    if (text.includes("door") && !text.includes("hinge")) {
      addIssue("WARN", `${filename} door missing hinge`);
      score -= 5;
    }

    if (text.includes("hood") && !text.includes("hinge")) {
      addIssue("WARN", `${filename} hood missing hinge`);
      score -= 5;
    }
  }

  score = Math.max(0, score);

  output.innerHTML = `
    <h3>Score: ${score}/100</h3>
    <p>Vehicles detected: ${detectedVehicles.length ? detectedVehicles.join(", ") : "none"}</p>
    <p>Issues: ${report.length}</p>
    <pre>${report.join("\n")}</pre>`;
}

async function fixAndExport() {
if (!loadedZip) {
alert("Analyze first!");
return;
}

const override = document.getElementById("carNameOverride").value;
const strict = document.getElementById("strictMode").checked;

const vehicles = detectVehicles(loadedZip);
const baseName = override || vehicles[0] || "custom_vehicle";

const newZip = new JSZip();

for (const filename in loadedZip.files) {
const file = loadedZip.files[filename];

if (file.dir) {
  newZip.folder(filename);
  continue;
}

let content = await file.async("string");

if (filename.endsWith(".jbeam") || filename.endsWith(".json")) {

  // remove donor refs safely
  content = content.replace(/mohawk|bruckell/gi, baseName);
  content = content.replace(/\bmo_/g, baseName + "_");

  // slot fix
  content = content.replace(
    /"slotType"\s*:\s*".*?"/g,
    `"slotType": "${baseName}_main"`
  );

  // strict mode enforcement
  if (strict && !filename.includes("vehicles/")) {
    continue; // skip invalid structure files
  }
}

newZip.file(filename, content);

}

const blob = await newZip.generateAsync({ type: "blob" });

const link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = "${baseName}_fixed_v3.zip";
link.click();
}
</script>

</body>
</html>
